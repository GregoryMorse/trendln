name: Publish to PyPI

# Trigger on a published GitHub Release (tag + release notes).
# Before this works you must configure a Trusted Publisher on PyPI:
#   https://pypi.org/manage/project/trendln/settings/publishing/
#   Publisher: GitHub Actions
#   Owner:     GregoryMorse
#   Repo:      trendln
#   Workflow:  publish.yml
#   Environment: pypi

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/trendln/
    permissions:
      id-token: write   # required for OIDC trusted publishing

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
